name: iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync and Update
        run: |
          npx cap sync ios
          npx cap update ios

      - name: Show iOS Project
        run: |
          ls -la ios
          ls -la ios/App

      - name: Build Xcode Project
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: |
            /Users/runner/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app