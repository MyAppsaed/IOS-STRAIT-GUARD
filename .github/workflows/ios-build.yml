name: iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync and Update
        run: |
          npx cap sync ios
          npx cap update ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build Xcode Project
        run: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -CODE_SIGN_IDENTITY="" \
            -CODE_SIGNING_REQUIRED=NO

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: /Users/runner/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app